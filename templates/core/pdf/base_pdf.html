<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <style>
        @page { size: a4; margin: 1cm; }
        body { font-family: 'Helvetica', 'Arial', sans-serif; font-size: 11px; color: #1a1d23; margin: 0; padding: 0; }
        
        /* Header styling with Logo */
        .pdf-header { margin-bottom: 25px; border-bottom: 2px solid #2563EB; padding-bottom: 15px; }
        .header-table { width: 100%; border: none; }
        .header-table td { border: none; vertical-align: middle; padding: 0; }
        .logo-box { width: 150px; }
        .title-box { text-align: right; }
        .title-box h1 { font-size: 18pt; color: #000; margin: 0; font-weight: bold; text-transform: uppercase; }
        .title-box p { font-size: 8pt; color: #2563EB; margin: 5px 0 0; font-weight: bold; letter-spacing: 1px; }

        .section { margin-bottom: 20px; }
        .section h2 { font-size: 12px; color: #000; border-bottom: 1px solid #eee; padding-bottom: 5px; margin-bottom: 10px; text-transform: uppercase; font-weight: bold; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 5px; }
        table th, table td { padding: 8px 12px; text-align: left; border: 1px solid #e1e4e8; font-size: 10px; }
        table th { background: #f8f9fa; color: #000; font-weight: bold; text-transform: uppercase; font-size: 9px; }
        
        .badge { padding: 3px 10px; border-radius: 12px; font-size: 9px; color: #fff; font-weight: bold; }
        .badge-primary { background: #2563EB; }
        .badge-danger { background: #2563EB; }
        .badge-success { background: #28a745; }
        
        .footer { position: fixed; bottom: 0; left: 0; right: 0; height: 30px; text-align: center; font-size: 8px; color: #95a5a6; border-top: 1px solid #eee; padding-top: 10px; }
        .info-table { border: none !important; margin-bottom: 10px; }
        .info-table td { border: none !important; padding: 4px 0 !important; font-size: 11px; }
        .label { font-weight: bold; width: 150px; color: #333; }
        .text-red { color: #2563EB; }
    </style>
</head>
<body>
    <div class="pdf-header">
        <table class="header-table">
            <tr>
                <td class="logo-box">
                    {% if logo_path %}
                    <img src="{{ logo_path }}" style="height: 50px;">
                    {% endif %}
                </td>
                <td class="title-box">
                    <h1>GESTION DES VISITEURS</h1>
                    <p>UWAZY • VISITOR MANAGEMENT SYSTEM</p>
                </td>
            </tr>
        </table>
    </div>

    {% block pdf_content %}{% endblock %}

    <div class="footer">
        Document officiel généré par le Système de Gestion UWAZY - {% now "d/m/Y H:i" %} - Page <pdf:pagenumber/>
    </div>
</body>
</html>
